<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player Stats Tracker</title>
<style>
  :root{--bg:#0F1420;--panel:#161C2C;--panel2:#1D2537;--border:#2A3348;--text:#E5E9F0;--muted:#8B93A7;
        --orca:#4C9AFF;--cerb:#FF6B6B;--accent:#2DD4BF;--up:#34D399;--down:#F87171;--stagnant:#F59E0B}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:14px}
  header{padding:20px 28px;border-bottom:1px solid var(--border)}
  h1{margin:0;font-size:20px}
  .subtitle{color:var(--muted);font-size:12.5px;margin-top:4px}
  main{padding:20px 28px;max-width:1500px;margin:0 auto}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .toolbar input, .toolbar select, .toolbar button{
    background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px}
  .toolbar button{cursor:pointer}
  .toolbar label{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;padding:8px 12px}
  .toggle-group{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .toggle-group button{border:none;border-radius:0;background:var(--panel2)}
  .toggle-group button.active{background:var(--accent);color:#04211D;font-weight:600}
  .snap-picker{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);
    border-radius:8px;padding:8px 14px;margin-bottom:16px;flex-wrap:wrap}
  .snap-picker .arrow{color:var(--muted)}
  .snap-picker select{background:var(--panel2)}
  .count-line{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative}
  .card.stagnant{border-color:var(--stagnant)}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .card-head .name-block a{color:var(--text);text-decoration:none;font-weight:700;font-size:15px}
  .card-head .name-block a:hover{color:var(--accent)}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-top:4px}
  .pill.orca{background:rgba(76,154,255,.15);color:var(--orca)}
  .pill.cerb{background:rgba(255,107,107,.15);color:var(--cerb)}
  .stagnant-badge{background:rgba(245,158,11,.15);color:var(--stagnant);border:1px solid rgba(245,158,11,.4);
    border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}
  .stat-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:4px 0;
    border-bottom:1px solid var(--border);font-size:12.5px}
  .stat-row:last-child{border-bottom:none}
  .stat-row .label{color:var(--muted)}
  .stat-row .val{text-align:right;font-variant-numeric:tabular-nums}
  .stat-row .delta{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;min-width:64px}
  .delta.up{color:var(--up)} .delta.down{color:var(--down)} .delta.flat{color:var(--muted)} .delta.na{color:var(--muted)}
  .note{color:var(--muted);font-size:12px;margin-top:20px;line-height:1.6}
  .empty{color:var(--muted);padding:40px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>Player Stats Tracker</h1>
  <div class="subtitle" id="subtitle-text"></div>
</header>
<main>
  <div class="snap-picker">
    <span style="color:var(--muted);font-size:12.5px">Compare</span>
    <select id="from-snap"></select>
    <span class="arrow">&rarr;</span>
    <select id="to-snap"></select>
  </div>
  <div class="toolbar">
    <input id="search" type="text" placeholder="Search player...">
    <div class="toggle-group" id="alliance-toggle">
      <button data-alliance="All" class="active">All</button>
      <button data-alliance="Orca">Orca</button>
      <button data-alliance="Cerb">Cerb</button>
    </div>
    <label><input type="checkbox" id="only-stagnant"> Show only stagnant</label>
    <select id="sort-select">
      <option value="name">Sort: Name</option>
      <option value="stagnant-first">Sort: Stagnant first</option>
      <option value="most-changed">Sort: Most changed first</option>
    </select>
  </div>
  <div class="count-line" id="count-line"></div>
  <div class="cards" id="cards"></div>
  <div class="note" id="footer-note"></div>
</main>

1\u5b50LaoZi", "alliance": "Orca", "link": "https://stfc.pro/players/1507595807", "stats": {"Missions Complete": [3893, 3897, 3897], "Player Ships Destroyed": [4280, 4280, 4280], "Player Damage": [80640000000, 80640000000, 80640000000], "Player Power Destroyed": [688860000, 688860000, 688860000], "Hostiles Destroyed": [320400, 320810, 320810], "Hostile Damage": [23790000000000000, 24010000000000000, 24010000000000000], "Resources Mined": [3500000000, 3500000000, 3500000000], "Resources Raided": [1950000000000, 1950000000000, 1950000000000], "Alliance Helps": [238270, 238390, 238390]}}], "generated": "2026-07-23T18:06:08.055059"};
const STATS = BUNDLE.stats;
const DATES = BUNDLE.snapshot_dates;
let fromIdx = 0, toIdx = DATES.length - 1;
let currentAlliance = 'All', searchTerm = '', onlyStagnant = false, sortMode = 'name';

function fmt(n){ return (n===null||n===undefined) ? '–' : n.toLocaleString('en-US'); }
function fmtSigned(n){
  if(n===null||n===undefined) return '–';
  const s = n.toLocaleString('en-US');
  return n>0 ? '+'+s : s;
}
function fmtDateLabel(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function deltaClass(n){ if(n===null||n===undefined) return 'na'; return n>0?'up':(n<0?'down':'flat'); }

function populateSnapSelectors(){
  const opts = DATES.map((d,i)=>`<option value="${i}">${fmtDateLabel(d)}${i===0?' (baseline)':''}</option>`).join('');
  const fromSel = document.getElementById('from-snap');
  const toSel = document.getElementById('to-snap');
  fromSel.innerHTML = opts; toSel.innerHTML = opts;
  fromSel.value = fromIdx; toSel.value = toIdx;
  fromSel.addEventListener('change', ()=>{ fromIdx = parseInt(fromSel.value); renderAll(); });
  toSel.addEventListener('change', ()=>{ toIdx = parseInt(toSel.value); renderAll(); });
}

function playerRow(p){
  const rows = STATS.map(s=>{
    const from = p.stats[s][fromIdx], to = p.stats[s][toIdx];
    const delta = (from!==null && from!==undefined && to!==null && to!==undefined) ? (to - from) : null;
    return {stat:s, from, to, delta};
  });
  const comparable = rows.filter(r=>r.delta!==null);
  const stagnant = comparable.length>0 && comparable.every(r=>r.delta===0);
  const noData = comparable.length===0;
  const changedCount = comparable.filter(r=>r.delta!==0).length;
  return {p, rows, stagnant, noData, changedCount};
}

function computeCards(){
  let list = BUNDLE.players
    .filter(p=>currentAlliance==='All' || p.alliance===currentAlliance)
    .map(playerRow);
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    list = list.filter(c=>c.p.name.toLowerCase().includes(q));
  }
  if(onlyStagnant) list = list.filter(c=>c.stagnant);
  if(sortMode==='name') list.sort((a,b)=>a.p.name.toLowerCase()<b.p.name.toLowerCase()?-1:1);
  else if(sortMode==='stagnant-first') list.sort((a,b)=>(b.stagnant-a.stagnant) || (a.p.name.toLowerCase()<b.p.name.toLowerCase()?-1:1));
  else if(sortMode==='most-changed') list.sort((a,b)=>b.changedCount-a.changedCount || (a.p.name.toLowerCase()<b.p.name.toLowerCase()?-1:1));
  return list;
}

function renderCards(){
  const cards = computeCards();
  const wrap = document.getElementById('cards');
  if(!cards.length){ wrap.innerHTML = '<div class="empty">No players match the current filters.</div>'; return; }
  wrap.innerHTML = cards.map(c=>{
    const statRows = c.rows.map(r=>`
      <div class="stat-row">
        <span class="label">${r.stat}</span>
        <span class="val">${fmt(r.from)} &rarr; ${fmt(r.to)}</span>
        <span class="delta ${deltaClass(r.delta)}">${r.delta===null?'–':fmtSigned(r.delta)}</span>
      </div>`).join('');
    return `<div class="card ${c.stagnant?'stagnant':''}">
      <div class="card-head">
        <div class="name-block">
          <a href="${c.p.link}" target="_blank" rel="noopener">${c.p.name}</a><br>
          <span class="pill ${c.p.alliance==='Orca'?'orca':'cerb'}">${c.p.alliance||'–'}</span>
        </div>
        ${c.stagnant ? '<span class="stagnant-badge">STAGNANT</span>' : (c.noData ? '<span class="stagnant-badge" style="color:var(--muted);border-color:var(--border);background:transparent">NO DATA</span>' : '')}
      </div>
      ${statRows}
    </div>`;
  }).join('');
}

function renderCount(){
  const cards = computeCards();
  const stagnantCount = cards.filter(c=>c.stagnant).length;
  document.getElementById('count-line').textContent =
    `${cards.length} player${cards.length===1?'':'s'} shown` +
    (onlyStagnant ? '' : ` · ${stagnantCount} stagnant (no change in any stat) between the selected snapshots`);
}

function renderAll(){
  renderCards();
  renderCount();
}

document.getElementById('alliance-toggle').addEventListener('click', e=>{
  const btn = e.target.closest('button'); if(!btn) return;
  document.querySelectorAll('#alliance-toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentAlliance = btn.dataset.alliance;
  renderAll();
});
document.getElementById('search').addEventListener('input', e=>{ searchTerm = e.target.value; renderAll(); });
document.getElementById('only-stagnant').addEventListener('change', e=>{ onlyStagnant = e.target.checked; renderAll(); });
document.getElementById('sort-select').addEventListener('change', e=>{ sortMode = e.target.value; renderAll(); });

document.getElementById('subtitle-text').textContent =
  `${BUNDLE.players.length} active players tracked · ${DATES.length} snapshot${DATES.length===1?'':'s'} captured so far`;
document.getElementById('footer-note').textContent =
  `Re-run the "Capture Stats Snapshot" bookmarklet anytime and send the new file to add another snapshot ` +
  `to the selector above. Numbers converted from stfc.pro's abbreviated K/M/B/T/Q/Qi format. ` +
  `Generated ${new Date(BUNDLE.generated).toLocaleString()}.`;

populateSnapSelectors();
renderAll();
</script>
